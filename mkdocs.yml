site_name: Yanyan Wang
site_author: Yanyan Wang
site_url: https://yanyanwang-math.github.io/

site_description: >-
  A personal collection of mathematical notes, papers, proofs, and questions,
  guided by curiosity.

theme:
  name: material
  language: en

  icon:
   logo: material/sprout

  palette:
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - meta
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - stylesheets/fresh.css
  
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Mathematics:
      - Overview: mathematics/index.md
      - Analytic Number Theory: analytic-number-theory/index.md
      - Probabilistic Number Theory: probabilistic-number-theory/index.md
      - Algebraic Number Theory: algebraic-number-theory/index.md
      - Automorphic Forms: automorphic-forms/index.md
      - Representation Theory: representation-theory/index.md
      - Homogeneous Dynamics: homogeneous-dynamics/index.md
  - Notes:
      - Overview: papers/index.md
      - Paper Notes: papers/paper-notes/index.md
      - Seminar Notes: papers/seminar-notes/index.md
      - Expository Notes: papers/expository-notes/index.md
  - About Me: about.md
